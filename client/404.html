<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="author" content="Sherman Nagel Adventist High School" />
  <meta name="description" content="The page you are looking for could not be found on the Sherman Nagel Adventist High School Website." />
  <meta name="robots" content="noindex, follow" />
  <meta name="theme-color" content="#002366" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

  <link rel="manifest" href="/manifest.json" />

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --royal-blue: #002366;
      --royal-blue-dark: #001a4d;
      --white: #FFFFFF;
    }
    html, body { background: var(--royal-blue); }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      font-family: var(--font-body); font-weight: 600; font-size: 0.95rem;
      padding: 10px 18px; border: none; border-radius: var(--radius);
      cursor: pointer; transition: background 0.15s, opacity 0.15s; text-align: center;
    }
    .btn-secondary { background: var(--sky-blue); color: #0d2647; }
    .nf-wrap {
      min-height: 100vh; min-height: 100dvh; display: grid; place-items: center;
      padding: 24px; text-align: center; color: var(--white);
      background: linear-gradient(135deg, var(--royal-blue) 0%, var(--royal-blue-dark) 100%);
    }
    .nf-wrap img { width: 8rem; height: 8rem; background: var(--white);
      object-fit: cover; display: block; margin: 0 auto 20px; border-radius: 50%}
    .nf-wrap h1 { color: var(--white); font-size: 3.5rem; margin-bottom: 4px; }
    .nf-wrap h2 { color: var(--white); font-size: 1.3rem; margin-bottom: 10px; }
    .nf-wrap p { opacity: 0.9; max-width: 420px; margin: 0 auto 24px; }
  </style>
</head>
<body>
  <div class="nf-wrap">
    <div>
      <img src="/SNAHS-logo.png" alt="SNAHS logo" />
      <h1>404</h1>
      <h2>Page Not Found</h2>
      <p>The page you are looking for doesn't exist or may have been moved.</p>
      <a class="btn btn-secondary" href="/index">← Back to home</a>
    </div>
  </div>
</body>
</html>
